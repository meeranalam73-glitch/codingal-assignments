<html>

<head>
    <title>My Colour Card</title>

    <style>
        /* Universal Selector - applies to everything on the page */
        * {
            font-size: 16px;
        }

        /* Element Selectors */
        body {
            background-color: beige;
        }

        h1 {
            color: white;
        }

        p {
            color: blueviolet;
        }

        /* Class Selector */
        .my-detail {
            color: rgb(43, 226, 52);
            font-weight: bold;
        }

        /* ID Selector */
        #my-card {
            background-color: aqua;
        }
    </style>

    <head>

    <body>

        <h1>My Colour Card</h1>
        <!-- Inline CSS -->
        <p style="color:brown;">Hi! This is my very own webpage.</p>

        <div id="my-card">

            <h2>About Me</h2>
            <p class="my-detail">My name is Sam.</p>\
            <p class="my-detail">My favourite colour is red.</p>

        </div>

        <h2>My Favourite Things</h2>
        <p>my favourite animal is cat.</p>
        <p>My favourite sport is cricket.</p>

    </body>

</html>
